server {
    listen 80;
    server_name your-domain.com;

    root /home/user/e-commerce/structbrew/public;
    index index.php;

    charset utf-8;

    # Security: block sensitive files
    location ~* \.(env|ini|lock|sql|sqlite|bak|git|yml|toml|xml)$ {
        deny all;
        return 404;
    }

    # Security: block hidden files (dotfiles)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Disable directory listing
    autoindex off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_vary on;
    gzip_min_length 256;

    # Browser caching for static assets
    location ~* \.(jpg|jpeg|gif|png|svg|ico|webp)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(css|js)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Main routing: pass all requests to index.php (front controller)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_index index.php;
        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
    }

    # Block access to Brew directory directly (only accessible via PHP)
    location ~ ^/\.\./ {
        deny all;
    }
}
